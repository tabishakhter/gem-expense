<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wealth | Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .accent-gradient { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="p-6 md:p-12 max-w-2xl mx-auto pb-24">

    <header class="flex justify-between items-center mb-10">
        <div>
            <h1 class="text-2xl font-bold tracking-tight">Personal Wealth</h1>
            <p class="text-slate-400 text-sm">Private Tracking</p>
        </div>
        <div class="w-12 h-12 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center font-bold text-indigo-400">JD</div>
    </header>

    <div class="accent-gradient p-8 rounded-[2.5rem] mb-10 shadow-2xl shadow-indigo-500/20">
        <p class="text-indigo-100/80 text-xs font-bold uppercase tracking-widest mb-2">Monthly Spend</p>
        <h2 id="totalSpend" class="text-5xl font-extrabold mb-8">₹0</h2>
        <div class="flex justify-between items-center bg-white/10 p-4 rounded-2xl backdrop-blur-md">
            <span class="text-sm font-medium">Entries</span>
            <span id="entryCount" class="font-bold">0</span>
        </div>
    </div>

    <div class="mb-10">
        <button onclick="openModal()" class="w-full p-6 glass rounded-[2rem] flex items-center justify-center space-x-4 hover:bg-slate-800 transition active:scale-95 border-dashed border-2 border-slate-700">
            <div class="w-10 h-10 bg-indigo-500/20 text-indigo-400 rounded-full flex items-center justify-center">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"></path></svg>
            </div>
            <span class="font-bold">Add New Expense</span>
        </button>
    </div>

    <div>
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-lg font-bold">Recent Transactions</h3>
            <button onclick="clearAll()" class="text-xs text-slate-500 hover:text-red-400">Clear All</button>
        </div>
        <div id="historyList" class="space-y-4">
            </div>
    </div>

    <div id="expenseModal" class="fixed inset-0 bg-slate-950/90 backdrop-blur-md hidden items-end md:items-center justify-center z-50 p-4">
        <div class="bg-slate-900 w-full max-w-md p-8 rounded-[2.5rem] border border-slate-800 shadow-2xl">
            <h4 class="text-xl font-bold mb-6">New Entry</h4>
            <div class="space-y-4">
                <input type="number" id="expAmount" placeholder="Amount (₹)" class="w-full bg-slate-800 border-none p-5 rounded-2xl text-2xl font-bold focus:ring-2 focus:ring-indigo-500 outline-none">
                <input type="text" id="expNote" placeholder="Note (e.g. Coffee)" class="w-full bg-slate-800 border-none p-5 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none">
                <select id="expCat" class="w-full bg-slate-800 border-none p-5 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none text-slate-300">
                    <option value="Lifestyle">Lifestyle</option>
                    <option value="Business">Business</option>
                    <option value="Food">Food & Drinks</option>
                    <option value="Travel">Travel</option>
                </select>
                <button onclick="saveExpense()" class="w-full accent-gradient py-5 rounded-2xl font-bold shadow-lg shadow-indigo-500/20">Save Expense</button>
                <button onclick="closeModal()" class="w-full py-2 text-slate-500 text-sm font-semibold">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let expenses = JSON.parse(localStorage.getItem('my_expenses')) || [];

        function openModal() { document.getElementById('expenseModal').classList.replace('hidden', 'flex'); }
        function closeModal() { document.getElementById('expenseModal').classList.replace('flex', 'hidden'); }

        function saveExpense() {
            const amt = document.getElementById('expAmount').value;
            const note = document.getElementById('expNote').value;
            const cat = document.getElementById('expCat').value;

            if(!amt || !note) return alert("Please fill in details");

            const entry = { amt: parseFloat(amt), note, cat, date: new Date().toLocaleDateString() };
            expenses.unshift(entry);
            localStorage.setItem('my_expenses', JSON.stringify(expenses));
            
            updateUI();
            closeModal();
            document.getElementById('expAmount').value = '';
            document.getElementById('expNote').value = '';
        }

        function updateUI() {
            const list = document.getElementById('historyList');
            const totalDisplay = document.getElementById('totalSpend');
            const countDisplay = document.getElementById('entryCount');

            list.innerHTML = expenses.map(e => `
                <div class="glass p-5 rounded-3xl flex justify-between items-center">
                    <div class="flex items-center space-x-4">
                        <div class="w-12 h-12 bg-slate-800 rounded-2xl flex items-center justify-center text-lg">💰</div>
                        <div>
                            <p class="font-bold">${e.note}</p>
                            <p class="text-xs text-slate-500">${e.cat} • ${e.date}</p>
                        </div>
                    </div>
                    <p class="font-bold text-red-400">- ₹${e.amt}</p>
                </div>
            `).join('');

            const total = expenses.reduce((sum, e) => sum + e.amt, 0);
            totalDisplay.innerText = '₹' + total.toLocaleString();
            countDisplay.innerText = expenses.length;
        }

        function clearAll() {
            if(confirm("Wipe all data?")) {
                expenses = [];
                localStorage.clear();
                updateUI();
            }
        }

        updateUI();
    </script>
</body>
</html>
