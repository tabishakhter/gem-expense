<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wealth | Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .accent-gradient { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .date-card.active { background: #6366f1 !important; color: white !important; border-color: #6366f1 !important; transform: scale(1.05); }
    </style>
</head>
<body class="p-4 md:p-12 max-w-2xl mx-auto pb-24">

    <header class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-2xl font-bold tracking-tight text-white">Personal Wealth</h1>
            <p id="currentMonthYear" class="text-slate-400 text-sm">Loading...</p>
        </div>
        <div class="w-10 h-10 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center font-bold text-indigo-400">JD</div>
    </header>

    <div id="dateScroller" class="flex space-x-3 overflow-x-auto no-scrollbar mb-10 pb-2">
        </div>

    <div class="accent-gradient p-8 rounded-[2.5rem] mb-8 shadow-2xl shadow-indigo-500/20">
        <p class="text-indigo-100/80 text-xs font-bold uppercase tracking-widest mb-1">Daily Spend</p>
        <h2 id="totalSpend" class="text-4xl font-extrabold mb-4">₹0</h2>
        <div class="text-xs text-indigo-100/60 font-medium">Monthly Total: <span id="monthlyTotal">₹0</span></div>
    </div>

    <div>
        <div class="flex justify-between items-center mb-6 px-2">
            <h3 class="text-lg font-bold">Transactions</h3>
            <button onclick="openModal()" class="w-12 h-12 accent-gradient rounded-full flex items-center justify-center shadow-lg active:scale-90 transition">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            </button>
        </div>
        <div id="historyList" class="space-y-4">
            </div>
    </div>

    <div id="expenseModal" style="display: none;" class="fixed inset-0 bg-slate-950/90 backdrop-blur-md items-end md:items-center justify-center z-50 p-4">
        <div class="bg-slate-900 w-full max-w-md p-8 rounded-[2.5rem] border border-slate-800 shadow-2xl mb-4 md:mb-0">
            <h4 class="text-xl font-bold mb-6">New Entry</h4>
            <div class="space-y-4">
                <input type="number" id="expAmount" placeholder="Amount (₹)" class="w-full bg-slate-800 border-none p-5 rounded-2xl text-2xl font-bold text-white focus:ring-2 focus:ring-indigo-500 outline-none">
                <input type="text" id="expNote" placeholder="Note (e.g. Lunch)" class="w-full bg-slate-800 border-none p-5 rounded-2xl text-white focus:ring-2 focus:ring-indigo-500 outline-none">
                <select id="expCat" class="w-full bg-slate-800 border-none p-5 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none text-slate-300">
                    <option value="Lifestyle">Lifestyle</option>
                    <option value="Business">Business</option>
                    <option value="Food">Food & Drinks</option>
                    <option value="Travel">Travel</option>
                </select>
                <button onclick="saveExpense()" class="w-full accent
